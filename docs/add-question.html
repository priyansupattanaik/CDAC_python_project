<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Question</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="max-width:600px;">
    <div class="header">
      <h2>Add New Question</h2>
      <a href="dashboard.html" class="btn btn-gray">Cancel</a>
    </div>
    <div id="flash"></div>
    <div class="panel">
      <form id="addForm">
        <div class="form-group">
          <label>Question Text</label>
          <input type="text" name="question" required>
        </div>
        <div class="form-group"><label>Option 1</label><input type="text" name="opt1" required></div>
        <div class="form-group"><label>Option 2</label><input type="text" name="opt2" required></div>
        <div class="form-group"><label>Option 3</label><input type="text" name="opt3" required></div>
        <div class="form-group"><label>Option 4</label><input type="text" name="opt4" required></div>
        <div class="form-group">
          <label>Correct Answer</label>
          <select name="answer" required>
            <option value="1">Option 1</option>
            <option value="2">Option 2</option>
            <option value="3">Option 3</option>
            <option value="4">Option 4</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Save Question</button>
      </form>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    initStorage().then(() => {
      if (!requireAuth("Admin")) return;
      document.getElementById("addForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const opts = [fd.get("opt1"), fd.get("opt2"), fd.get("opt3"), fd.get("opt4")];
        const idx = parseInt(fd.get("answer")) - 1;
        addQuestion(fd.get("question").trim(), opts[0], opts[1], opts[2], opts[3], opts[idx]);
        location.href = page("dashboard.html");
      });
    });
  </script>
</body>
</html>

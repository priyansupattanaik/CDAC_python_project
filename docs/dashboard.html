<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2><span id="userLabel"></span> <span class="user-badge" id="roleLabel"></span></h2>
      <a href="index.html" class="btn btn-red" id="logoutBtn">Logout</a>
    </div>

    <div id="studentActions" class="actions" style="display:none;">
      <a href="take-quiz.html" class="btn btn-green">Take a New Quiz</a>
      <a href="update-password.html" class="btn btn-orange">Update Password</a>
      <a href="delete-account.html" class="btn btn-red">Delete Account</a>
    </div>

    <div id="adminActions" class="actions" style="display:none;">
      <a href="add-question.html" class="btn btn-green">Add Question to Bank</a>
    </div>

    <div id="adminQuestions" style="display:none; margin-bottom:30px;">
      <h3 style="color:#2c3e50;">Question Bank</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Question</th><th>Correct Answer</th></tr></thead>
          <tbody id="qBody"></tbody>
        </table>
      </div>
    </div>

    <div id="content"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    initStorage().then(() => {
      const session = getSession();
      if (!session) {
        location.href = page("index.html");
        return;
      }

      document.getElementById("userLabel").textContent = session.username;
      document.getElementById("roleLabel").textContent = "(" + session.role + " View)";
      document.getElementById("logoutBtn").href = page("index.html");
      document.getElementById("logoutBtn").addEventListener("click", (e) => {
        e.preventDefault();
        clearSession();
        location.href = page("index.html");
      });

      if (session.role === "Admin") {
        renderAdminDashboard();
      } else {
        renderStudentDashboard(session);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="max-width:600px;">
    <div class="header">
      <h2>Delete Account</h2>
      <a href="dashboard.html" class="btn btn-gray">Cancel</a>
    </div>
    <div class="warning">
      <strong>Warning:</strong> This cannot be undone. All quiz results will be deleted.
    </div>
    <div class="panel">
      <form id="delForm">
        <div class="form-group">
          <label>Are you sure?</label>
          <select name="confirm" required>
            <option value="">Select</option>
            <option value="no">No, keep my account</option>
            <option value="yes">Yes, delete my account</option>
          </select>
        </div>
        <button type="submit" class="btn btn-red" style="width:100%;">Confirm</button>
      </form>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    initStorage().then(() => {
      const session = requireAuth("Student");
      if (!session) return;
      document.getElementById("delForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const confirm = new FormData(e.target).get("confirm");
        if (confirm === "yes") {
          removeUser(session.username);
          clearSession();
          location.href = page("index.html");
        } else {
          location.href = page("dashboard.html");
        }
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Portal Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="center-box">
    <div class="auth-box">
      <h2>Quiz Portal</h2>
      <p class="subtitle">Log in to take the quiz</p>
      <div id="flash"></div>
      <form id="loginForm">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
      <p style="margin-top:20px;"><a href="register.html">Don't have an account? Register</a></p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    initStorage().then(() => {
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const result = login(fd.get("username").trim(), fd.get("password"));
        if (result.ok) {
          location.href = page("dashboard.html");
        } else {
          document.getElementById("flash").innerHTML =
            '<div class="flash error">' + result.msg + "</div>";
        }
      });
    });
  </script>
</body>
</html>

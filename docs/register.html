<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="center-box">
    <div class="auth-box">
      <h2>Quiz Portal</h2>
      <p class="subtitle">Create your account</p>
      <div id="flash"></div>
      <form id="regForm">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="username" placeholder="Username (3-20 chars)" required>
        <input type="password" name="password" placeholder="Password (min 4 chars)" required>
        <button type="submit" class="btn btn-primary">Register</button>
      </form>
      <p style="margin-top:20px;"><a href="index.html">Already have an account? Login</a></p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validators.js"></script>
  <script>
    initStorage().then(() => {
      document.getElementById("regForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const name = fd.get("name").trim();
        const username = fd.get("username").trim();
        const password = fd.get("password");
        const flash = document.getElementById("flash");

        if (!validateUsername(username)) {
          flash.innerHTML = '<div class="flash error">Username must be 3-20 letters or digits.</div>';
          return;
        }
        if (!validatePassword(password)) {
          flash.innerHTML = '<div class="flash error">Password must be at least 4 characters.</div>';
          return;
        }
        if (registerUser(name, username, password)) {
          flash.innerHTML = '<div class="flash success">Registered! <a href="index.html">Login now</a></div>';
        } else {
          flash.innerHTML = '<div class="flash error">Username already taken.</div>';
        }
      });
    });
  </script>
</body>
</html>

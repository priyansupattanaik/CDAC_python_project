<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Metrics</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2><span id="studentName"></span> <span class="user-badge" id="studentUser"></span></h2>
      <a href="dashboard.html" class="btn btn-gray">Back to Dashboard</a>
    </div>
    <div id="content"></div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    initStorage().then(() => {
      if (!requireAuth("Admin")) return;

      const params = new URLSearchParams(location.search);
      const username = params.get("username");
      if (!username) {
        location.href = page("dashboard.html");
        return;
      }

      const user = findUser(username);
      const name = user ? user.name : username;
      document.getElementById("studentName").textContent = name;
      document.getElementById("studentUser").textContent = "(@" + username + ")";

      const rows = getUserResults(username);
      if (!rows.length) {
        document.getElementById("content").innerHTML =
          '<div class="empty-state"><h3>No Quiz Data</h3><p>This student has not taken any quizzes.</p></div>';
        return;
      }

      const s = calcStats(rows);
      document.getElementById("content").innerHTML = `
        <div class="stats-grid">
          <div class="stat-card"><h3>Total Quizzes</h3><p>${s.count}</p></div>
          <div class="stat-card"><h3>Correct Answers</h3><p>${s.correct}</p></div>
          <div class="stat-card"><h3>Wrong Answers</h3><p>${s.wrong}</p></div>
          <div class="stat-card"><h3>Average Score</h3><p>${s.avg}</p></div>
        </div>
        <div class="charts">
          <div class="chart-card"><canvas id="lineChart"></canvas></div>
          <div class="chart-card"><canvas id="pieChart"></canvas></div>
        </div>`;

      lineChart("lineChart", s.scores, name + "'s Performance Over Time");
      pieChart("pieChart", s.correct, s.wrong, name + "'s Overall Accuracy");
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Quiz Test</h2>
      <a href="dashboard.html" class="btn btn-gray">Cancel</a>
    </div>
    <form id="quizForm"></form>
  </div>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    initStorage().then(() => {
      const session = requireAuth("Student");
      if (!session) return;

      const questions = getQuestions();
      if (!questions.length) {
        document.getElementById("quizForm").innerHTML =
          '<div class="empty-state">No questions available.</div>';
        return;
      }

      let html = "";
      questions.forEach((q, i) => {
        html += `<div class="panel question-block">
          <div class="question-text">Q${i + 1}: ${q.question}</div>
          <label class="option-lbl"><input type="radio" name="q_${i}" value="${q.opt1}" required> ${q.opt1}</label>
          <label class="option-lbl"><input type="radio" name="q_${i}" value="${q.opt2}" required> ${q.opt2}</label>
          <label class="option-lbl"><input type="radio" name="q_${i}" value="${q.opt3}" required> ${q.opt3}</label>
          <label class="option-lbl"><input type="radio" name="q_${i}" value="${q.opt4}" required> ${q.opt4}</label>
        </div>`;
      });
      html += '<button type="submit" class="btn btn-green" style="width:100%;padding:15px;">Submit Answers</button>';
      document.getElementById("quizForm").innerHTML = html;

      document.getElementById("quizForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        let score = 0;
        questions.forEach((q, i) => {
          const ans = fd.get("q_" + i);
          if (ans && ans.trim() === q.answer.trim()) score++;
        });
        addResult(session.username, score, questions.length);
        alert("Quiz done! Score: " + score + "/" + questions.length);
        location.href = page("dashboard.html");
      });
    });
  </script>
</body>
</html>

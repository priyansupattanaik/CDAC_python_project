<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="max-width:600px;">
    <div class="header">
      <h2>Update Password</h2>
      <a href="dashboard.html" class="btn btn-gray">Cancel</a>
    </div>
    <div id="flash"></div>
    <div class="panel">
      <form id="pwdForm">
        <div class="form-group">
          <label>New Password (min 4 characters)</label>
          <input type="password" name="new_password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Update Password</button>
      </form>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/validators.js"></script>
  <script>
    initStorage().then(() => {
      const session = requireAuth("Student");
      if (!session) return;
      document.getElementById("pwdForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const pwd = new FormData(e.target).get("new_password");
        if (!validatePassword(pwd)) {
          document.getElementById("flash").innerHTML =
            '<div class="flash error">Password must be at least 4 characters.</div>';
          return;
        }
        changePassword(session.username, pwd);
        alert("Password updated.");
        location.href = page("dashboard.html");
      });
    });
  </script>
</body>
</html>

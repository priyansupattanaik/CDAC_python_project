<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question (Admin)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .btn-cancel { text-decoration: none; padding: 10px 15px; background: #95a5a6; color: white; border-radius: 4px; font-weight: 600; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #2c3e50; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .btn-submit { display: block; width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 6px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 30px; }
        .btn-submit:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0;">➕ Add New Question</h2>
            <a href="{{ url_for('dashboard') }}" class="btn-cancel">Cancel</a>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label>Question Text</label>
                <input type="text" name="question" required>
            </div>
            
            <div class="form-group">
                <label>Option 1</label>
                <input type="text" name="opt1" required>
            </div>
            
            <div class="form-group">
                <label>Option 2</label>
                <input type="text" name="opt2" required>
            </div>
            
            <div class="form-group">
                <label>Option 3</label>
                <input type="text" name="opt3" required>
            </div>
            
            <div class="form-group">
                <label>Option 4</label>
                <input type="text" name="opt4" required>
            </div>
            
            <div class="form-group">
                <label>Correct Answer</label>
                <select name="answer" required>
                    <option value="1">Option 1 is correct</option>
                    <option value="2">Option 2 is correct</option>
                    <option value="3">Option 3 is correct</option>
                    <option value="4">Option 4 is correct</option>
                </select>
            </div>
            
            <button class="btn-submit" type="submit">Save to Question Bank</button>
        </form>
    </div>
</body>
</html>

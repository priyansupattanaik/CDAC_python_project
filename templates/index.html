<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Portal Login</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f7f6;
      }
      .login-box {
        padding: 40px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 350px;
        text-align: center;
      }
      h2 {
        color: #333;
        margin-top: 0;
        margin-bottom: 5px;
      }
      p.subtitle {
        color: #777;
        font-size: 0.9em;
        margin-bottom: 25px;
      }
      input {
        width: calc(100% - 20px);
        padding: 12px 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
      }
      button:hover {
        background: #357abd;
      }
      .error {
        color: #d9534f;
        background: #fdf7f7;
        padding: 10px;
        border-radius: 6px;
        font-size: 0.9em;
        margin-bottom: 15px;
        border: 1px solid #f2dede;
      }
      .success {
        color: #5cb85c;
        background: #f7fdf7;
        padding: 10px;
        border-radius: 6px;
        font-size: 0.9em;
        margin-bottom: 15px;
        border: 1px solid #d6e9c6;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>Quiz Portal</h2>
      <p class="subtitle">Log in to view your dashboard</p>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %} {% for category, msg in messages %}
      <div class="{{ category }}">{{ msg }}</div>
      {% endfor %} {% endif %} {% endwith %}

      <form method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Sign In</button>
      </form>
      <p>
        <a href="{{ url_for('register') }}">Don't have an account? Register</a>
      </p>
    </div>
  </body>
</html>
